name: Build and Release LaTeX Package

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Enable manual triggering

permissions:
  contents: write

jobs:
  build:
    name: Compile Package & Generate CTAN Archive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build CTAN Package and Manual
        uses: xu-cheng/latex-action@v3
        with:
          root_file: conversationalcomments.dtx
          # Run our verified CTAN build script as the compiler command
          compiler: bash
          args: ./build_ctan_package.sh
          # Install zip and unzip inside the LaTeX Docker container
          extra_system_packages: "zip unzip"

      - name: Upload Compiled Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: latex-package-dist
          path: |
            conversationalcomments.zip
            conversationalcomments-doc.pdf
            conversationalcomments.sty

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.ref_name == 'main' || github.ref_name == 'master' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Compiled Artifacts
        uses: actions/download-artifact@v4
        with:
          name: latex-package-dist
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'nightly' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Nightly Development Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          make_latest: ${{ startsWith(github.ref, 'refs/tags/v') && 'true' || 'false' }}
          files: |
            dist/conversationalcomments.zip
            dist/conversationalcomments-doc.pdf
            dist/conversationalcomments.sty
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
