name: Build and Release LaTeX Package

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    name: Compile Package & Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX Package and Docs
        uses: xu-cheng/latex-action@v3
        with:
          root_file: conversationalcomments.dtx
          # Unpack the sty file and generate the index/glossaries before latexmk compiles the final document.
          pre_compile: |
            latex conversationalcomments.ins
            pdflatex -interaction=nonstopmode conversationalcomments.dtx
            makeindex -s gind.ist -o conversationalcomments.ind conversationalcomments.idx
            makeindex -s gglo.ist -o conversationalcomments.gls conversationalcomments.glo
            pdflatex -interaction=nonstopmode conversationalcomments.dtx

      - name: Upload Compiled Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: latex-package-dist
          path: |
            conversationalcomments.sty
            conversationalcomments.pdf
            conversationalcomments.dtx
            conversationalcomments.ins
            README.md
            LICENSE

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Compiled Artifacts
        uses: actions/download-artifact@v4
        with:
          name: latex-package-dist
          path: dist

      - name: Package for Distribution (ZIP)
        run: |
          # Create a structured release directory
          mkdir -p release/conversationalcomments
          
          # Copy the compiled style, docs, and source files
          cp dist/conversationalcomments.sty release/conversationalcomments/
          cp dist/conversationalcomments.pdf release/conversationalcomments/
          cp dist/conversationalcomments.dtx release/conversationalcomments/
          cp dist/conversationalcomments.ins release/conversationalcomments/
          cp README.md LICENSE release/conversationalcomments/
          
          # Create the ZIP archive
          cd release
          zip -r ../conversationalcomments.zip ./*
          cd ..
          
          # Copy the PDF to the root for direct download on the release page
          cp dist/conversationalcomments.pdf ./

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            conversationalcomments.zip
            conversationalcomments.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
